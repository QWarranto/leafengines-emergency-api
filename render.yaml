services:
  - type: web
    name: leafengines-agricultural-intelligence
    runtime: python
    buildCommand: pip3 install -r requirements.txt
    startCommand: /opt/render/project/src/.venv/bin/gunicorn leafengines_emergency_api:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
      - key: FLASK_DEBUG
        value: false
      - key: ADMIN_TOKEN
        value: emergency_admin_20260405
      - key: LEAFENGINES_API_URL
        value: https://leafengines-agricultural-intelligence.onrender.com
      # Add these in Render dashboard:
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: leafengines-db
      #     property: connectionString
      # - key: FLASK_SECRET_KEY
      #   generateValue: true
      # - key: LEAFENGINES_STATS_KEY
      #   generateValue: true